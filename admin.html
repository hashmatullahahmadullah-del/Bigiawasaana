
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bigi OS | Admin</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="app-container">

  <!-- TOP BAR -->
  <header style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;">
    <div class="font-lalezar" style="font-size: 24px; color: var(--accent);">BIGI <span style="color: var(--white);">OS</span></div>
    <div style="display: flex; gap: 16px; align-items: center;">
      <span style="font-size: 11px; color: var(--green); border: 1px solid rgba(74,222,128,0.2); padding: 4px 12px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px;">System Online</span>
      <button class="btn-outline" style="padding: 8px 16px; font-size: 11px;" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div style="display: flex; flex: 1;">
    <!-- SIDEBAR -->
    <aside style="width: 240px; background: var(--bg); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 8px;">
      <button class="nav-btn active" onclick="showSection('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="showSection('orders')">Active Orders</button>
      <button class="nav-btn" onclick="showSection('menu-mgr')">Menu Manager</button>
      <div style="margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border);">
        <button class="btn-outline" style="width: 100%; color: var(--gray);" onclick="seedMenu()">Reset DB</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main style="flex: 1; padding: 40px; background: var(--bg); overflow-y: auto;">
      
      <!-- DASHBOARD -->
      <section id="dashboard" class="admin-section active">
        <h2 style="font-size: 24px; margin-bottom: 32px;">Overview</h2>
        
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px;">
          <div class="card">
            <div class="card-label">Daily Sales</div>
            <div class="card-value" id="daily-sales">$0.00</div>
          </div>
          <div class="card">
            <div class="card-label">Active Orders</div>
            <div class="card-value" id="order-count">0</div>
          </div>
          <div class="card">
            <div class="card-label">Top Seller</div>
            <div class="card-value" id="top-seller">—</div>
          </div>
          <div class="card">
            <div class="card-label">Stock Alerts</div>
            <div class="card-value" id="stock-alerts" style="color: var(--green);">All Clear</div>
          </div>
        </div>

        <div class="card">
          <div class="card-label">Sales Trend</div>
          <canvas id="salesChart" height="80"></canvas>
        </div>
      </section>

      <!-- ACTIVE ORDERS -->
      <section id="orders" class="admin-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
          <h2 style="font-size: 24px;">Kitchen Queue</h2>
          <a href="/display.html" target="_blank" class="btn-outline">Open Digital Display</a>
        </div>
        <div id="orders-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;">
          <!-- Orders inject here -->
        </div>
      </section>

      <!-- MENU MANAGER -->
      <section id="menu-mgr" class="admin-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
          <h2 style="font-size: 24px;">Menu Catalog</h2>
          <button class="btn-primary" onclick="openMenuModal()">Add Item</button>
        </div>
        
        <div class="card" style="padding: 0; overflow: hidden;">
          <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead style="background: var(--surface-2);">
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="menu-table-body">
              <!-- Menu injects here -->
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- MENU MODAL -->
  <div id="menu-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 500px; position: relative;">
      <button onclick="closeMenuModal()" style="position: absolute; top: 24px; right: 24px; background: none; border: none; color: var(--gray); font-size: 24px; cursor: pointer;">&times;</button>
      <h2 id="modal-title" style="font-size: 20px; margin-bottom: 24px;">Add New Item</h2>
      
      <form id="menu-form" style="display: flex; flex-direction: column; gap: 16px;">
        <input type="text" id="item-name" placeholder="Item Name" required class="admin-input">
        
        <div style="display: flex; gap: 16px;">
          <select id="item-category" class="admin-input" style="flex: 1;">
            <option value="wraps">Wraps</option>
            <option value="platters">Platters</option>
            <option value="sides">Sides</option>
            <option value="drinks">Drinks</option>
          </select>
          <input type="number" id="item-price" placeholder="Price" step="0.01" required class="admin-input" style="flex: 1;">
        </div>

        <textarea id="item-desc" placeholder="Description" rows="3" class="admin-input" style="resize: none;"></textarea>
        <input type="url" id="item-image" placeholder="Image URL" class="admin-input">
        
        <div style="display: flex; gap: 24px; margin: 8px 0; color: var(--gray); font-size: 13px;">
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="item-available" checked> In Stock
          </label>
          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="item-special"> Daily Special
          </label>
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 8px;">Save Item</button>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Bigi Awasaana</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/admin.css">
</head>
<body>
  <nav style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(6,6,6,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; height: 72px;">
      <a href="/" style="display: flex; align-items: center; text-decoration: none;">
        <img src="/logo.png" alt="Bigi Awasaana Logo" style="height: 64px; width: auto; object-fit: contain;">
      </a>
      <div style="font-family: 'Barlow Condensed'; font-weight: 600; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;">
        <span style="color: var(--accent);">Admin Dashboard</span>
      </div>
      <div>
        <button id="logout-btn" class="btn-outline" style="padding: 8px 16px; font-size: 12px; display: none;">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 100px; min-height: 100vh;">
    
    <!-- Login Section -->
    <section id="login-section" style="max-width: 400px; margin: 60px auto; background: var(--surface); padding: 32px; border: 1px solid var(--border); border-radius: 8px;">
      <h2 style="font-family: 'Lalezar'; margin-bottom: 24px; text-align: center;">Admin Login</h2>
      <form id="login-form" style="display: flex; flex-direction: column; gap: 16px;">
        <input type="email" id="admin-email" placeholder="Email" required style="padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--white); border-radius: 4px;">
        <input type="password" id="admin-password" placeholder="Password" required style="padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--white); border-radius: 4px;">
        <button type="submit" class="btn-primary" style="margin-top: 8px;">Sign In</button>
      </form>
      <div id="login-error" style="color: var(--accent); font-size: 12px; margin-top: 12px; text-align: center;"></div>
    </section>

    <!-- Dashboard Section -->
    <section id="dashboard-section" style="display: none;">
      
      <!-- Tabs -->
      <div style="display: flex; gap: 16px; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px;">
        <button class="tab-btn active" data-target="orders-view">Live Orders</button>
        <button class="tab-btn" data-target="menu-view">Menu Management</button>
      </div>

      <!-- Orders View -->
      <div id="orders-view" class="view-panel active">
        <h2 class="font-lalezar mb-m">Live Orders</h2>
        <div id="orders-list" style="display: grid; gap: 16px;">
          <!-- Orders dynamically injected here -->
        </div>
      </div>

      <!-- Menu Management View -->
      <div id="menu-view" class="view-panel" style="display: none;">
        <h2 class="font-lalezar mb-m">Menu Items (Coming Soon)</h2>
        <p style="color: var(--gray);">This section will allow you to edit prices, toggle item availability, and upload new photos.</p>
      </div>

    </section>

  </main>
  
  <script type="module" src="/src/admin.js"></script>
</body>
</html>

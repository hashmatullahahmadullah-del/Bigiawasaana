<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV1 Menu — Bigi Awasaana</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; overflow: hidden;
      font-family: sans-serif;
    }
    #menu-img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    #start-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #060606; z-index: 9999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer; color: white;
    }
    h1 { color: #ff4500; font-family: 'Arial Narrow', sans-serif; text-transform: uppercase; font-size: 4vw; }
    p { font-size: 1.5vw; opacity: 0.8; }
    /* Hide youtube video behind the image but keep it full-screen active */
    #yt-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
      z-index: -1; opacity: 0.01; pointer-events: none; overflow: hidden;
    }
    #yt-container iframe {
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1>Tap Here To Start Display (TV1)</h1>
    <p>This activates fullscreen, starts music, and enables WakeLock to prevent sleep.</p>
  </div>

  <div id="yt-container"></div>
  <img id="menu-img" src="/tv1-menu.jpg" alt="TV1 Menu">

  <!-- Include NoSleep.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
  <script>
    document.getElementById('start-overlay').addEventListener('click', async () => {
      document.getElementById('start-overlay').style.display = 'none';
      
      // Request fullscreen
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
      }

      // 1. Enable NoSleep.js fallback
      const noSleep = new NoSleep();
      noSleep.enable();

      // 2. Try modern Screen Wake Lock API
      if ('wakeLock' in navigator) {
        try {
          await navigator.wakeLock.request('screen');
        } catch (err) {
          console.log('Wake Lock error:', err);
        }
      }

      // 3. Add Youtube video (Lofi Girl) full-screen BEHIND the image 
      // This tricks the TV into thinking a full-screen video is playing.
      const ytId = '5qap5aO4i9A'; 
      document.getElementById('yt-container').innerHTML = `
        <iframe 
          src="https://www.youtube.com/embed/${ytId}?autoplay=1&loop=1&playlist=${ytId}&controls=0&mute=0" 
          frameborder="0" allow="autoplay" allowfullscreen>
        </iframe>
      `;
    });
  </script>
</body>
</html>

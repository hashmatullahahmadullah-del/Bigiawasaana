<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dashboard — Bigi Awasaana</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="crm-body">

  <div class="crm-layout">
    <!-- Sidebar / Bottom Nav on Mobile -->
    <nav class="crm-nav">
      <div class="crm-nav-header hide-mobile">
        <img src="/logo.png" alt="Bigi Logo" style="height: 48px; object-fit: contain;">
      </div>
      <div class="crm-nav-links">
        <button class="crm-nav-item active" data-target="dashboard-view">
          <span class="icon">📊</span>
          <span class="label">Dashboard</span>
        </button>
        <button class="crm-nav-item" data-target="customers-view">
          <span class="icon">👥</span>
          <span class="label">Customers</span>
        </button>
        <button class="crm-nav-item" data-target="orders-view">
          <span class="icon">🧾</span>
          <span class="label">Orders</span>
        </button>
        <button class="crm-nav-item" data-target="reviews-view">
          <span class="icon">⭐</span>
          <span class="label">Reviews</span>
        </button>
        <button class="crm-nav-item" data-target="loyalty-view">
          <span class="icon">🏆</span>
          <span class="label">Loyalty</span>
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="crm-main">
      
      <!-- Dashboard View -->
      <section id="dashboard-view" class="crm-view active">
        <h1 class="crm-view-title">Dashboard</h1>
        
        <div class="crm-stats-grid">
          <div class="crm-stat-card">
            <div class="stat-title">Total Customers</div>
            <div class="stat-value" id="dash-total-customers">0</div>
          </div>
          <div class="crm-stat-card">
            <div class="stat-title">Total Orders</div>
            <div class="stat-value" id="dash-total-orders">0</div>
          </div>
          <div class="crm-stat-card">
            <div class="stat-title">Avg Order Value</div>
            <div class="stat-value" id="dash-aov">$0.00</div>
          </div>
          <div class="crm-stat-card">
            <div class="stat-title">Repeat Rate</div>
            <div class="stat-value" id="dash-repeat-rate">0%</div>
          </div>
        </div>

        <div class="crm-dashboard-grid mt-m">
          <div class="crm-panel">
            <h2 class="crm-panel-title">Recent Activity</h2>
            <div id="dash-activity-feed" class="crm-feed"></div>
          </div>
          <div class="crm-panel">
            <h2 class="crm-panel-title">Top Spenders</h2>
            <div id="dash-top-spenders" class="crm-list"></div>
          </div>
        </div>
      </section>

      <!-- Customers View -->
      <section id="customers-view" class="crm-view" style="display: none;">
        <div class="crm-header-action">
          <h1 class="crm-view-title">Customers</h1>
          <button class="btn-primary btn-small" id="btn-add-customer">Add Customer</button>
        </div>
        <div class="crm-panel mt-m">
          <div class="crm-filters">
            <input type="text" id="customer-search" class="crm-input" placeholder="Search customers...">
          </div>
          <div class="crm-table-container">
            <table class="crm-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>Total Spent</th>
                  <th>Orders</th>
                  <th>Tier</th>
                </tr>
              </thead>
              <tbody id="customers-table-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Orders View -->
      <section id="orders-view" class="crm-view" style="display: none;">
        <h1 class="crm-view-title">Orders</h1>
        <div class="crm-panel mt-m">
          <div class="crm-filters">
            <input type="text" id="order-search" class="crm-input" placeholder="Search orders...">
            <select id="order-status-filter" class="crm-select">
              <option value="all">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div class="crm-table-container">
            <table class="crm-table">
              <thead>
                <tr>
                  <th>Order ID</th>
                  <th>Customer</th>
                  <th>Date</th>
                  <th>Total</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Reviews View -->
      <section id="reviews-view" class="crm-view" style="display: none;">
        <h1 class="crm-view-title">Reviews</h1>
        <div class="crm-panel mt-m">
          <div class="crm-filters">
            <select id="review-status-filter" class="crm-select">
              <option value="unresponded">Unresponded First</option>
              <option value="all">All Reviews</option>
            </select>
          </div>
          <div class="crm-reviews-grid" id="reviews-container"></div>
        </div>
      </section>

      <!-- Loyalty View -->
      <section id="loyalty-view" class="crm-view" style="display: none;">
        <h1 class="crm-view-title">Loyalty Program</h1>
        <div class="crm-stats-grid mt-m" id="loyalty-tiers-grid">
          <!-- Populated by JS -->
        </div>
        <div class="crm-panel mt-m">
          <h2 class="crm-panel-title">Tier Settings</h2>
          <div class="crm-tier-settings">
            <div class="crm-form-group">
              <label>Bronze Threshold ($)</label>
              <input type="number" id="tier-bronze" class="crm-input" value="0" disabled>
            </div>
            <div class="crm-form-group">
              <label>Silver Threshold ($)</label>
              <input type="number" id="tier-silver" class="crm-input" value="100">
            </div>
            <div class="crm-form-group">
              <label>Gold Threshold ($)</label>
              <input type="number" id="tier-gold" class="crm-input" value="300">
            </div>
            <button class="btn-outline btn-small" id="btn-save-tiers">Save Settings</button>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Slide-Over Panel for Customer Details -->
  <div class="crm-slide-over" id="customer-slide-over">
    <div class="crm-slide-over-header">
      <h2 id="slide-cust-name">Customer Name</h2>
      <button class="crm-btn-icon" onclick="closeCustomerSlideOver()">×</button>
    </div>
    <div class="crm-slide-over-content" id="slide-cust-content">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Order Modal -->
  <div class="crm-modal" id="order-modal">
    <div class="crm-modal-box">
      <div class="crm-modal-header">
        <h2 id="modal-order-title">Order #...</h2>
        <button class="crm-btn-icon" onclick="closeOrderModal()">×</button>
      </div>
      <div class="crm-modal-content" id="modal-order-content">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <div id="crm-toast-container"></div>

  <script type="module" src="/src/crm.js"></script>
</body>
</html>

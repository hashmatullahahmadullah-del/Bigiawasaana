<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bigi Awasaana | Kitchen Display</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
  
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/kitchen.css">
  <meta name="thumbnail" content="https://bigiawasaana.com/hero-food-spread.webp">
</head>
<body>

  <!-- Access Denied Gate -->
  <div id="kds-denied" style="display: none; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;">
    <div>
      <h1 style="font-family: 'Barlow Condensed'; color: var(--accent); font-size: 48px; letter-spacing: 2px;">ACCESS DENIED</h1>
      <p style="color: var(--gray); font-size: 20px; margin-top: 10px;">Visit any page with <code>?admin=true</code> to unlock.</p>
    </div>
  </div>

  <!-- PIN Screen -->
  <div id="kds-pin-screen" class="kds-pin-screen" style="display: none;">
    <div class="kds-pin-container">
      <img src="/logo.png" alt="Bigi Awasaana Logo" class="kds-pin-logo">
      <h2 class="kds-pin-title">Kitchen Access Only</h2>
      
      <div id="kds-pin-display" class="kds-pin-display">
        <!-- Dots will appear here -->
      </div>
      
      <div class="kds-pin-pad">
        <button class="kds-pin-key">1</button>
        <button class="kds-pin-key">2</button>
        <button class="kds-pin-key">3</button>
        <button class="kds-pin-key">4</button>
        <button class="kds-pin-key">5</button>
        <button class="kds-pin-key">6</button>
        <button class="kds-pin-key">7</button>
        <button class="kds-pin-key">8</button>
        <button class="kds-pin-key">9</button>
        <button class="kds-pin-key kds-pin-action" id="kds-pin-clear">CLEAR</button>
        <button class="kds-pin-key">0</button>
        <button class="kds-pin-key kds-pin-action" id="kds-pin-back">⌫</button>
      </div>
      
      <div id="kds-pin-error" class="kds-pin-error"></div>
    </div>
  </div>

  <!-- KDS App -->
  <div id="kds-app" style="display: none;">
    
    <!-- Header -->
    <header class="kds-header">
      <div class="kds-header-left">
        <img src="/logo.png" alt="Bigi Awasaana Logo" class="kds-logo-img">
        <div class="kds-tagline-container">
          <h1 class="kds-logo">BIGI <span>AWASAANA</span> KITCHEN</h1>
          <p class="kds-tagline">Born from the Silk Road. Grilled in Los Angeles.</p>
        </div>
      </div>
      <div class="kds-header-right">
        <div class="kds-clock" id="kds-clock">12:00:00 PM</div>
        <button id="kds-lang-btn" class="kds-icon-btn" aria-label="Toggle Persian" style="font-size: 20px;">🇮🇷</button>
        <button id="kds-mute-btn" class="kds-icon-btn" aria-label="Toggle Audio">🔔</button>
        <button id="kds-fullscreen-btn" class="kds-icon-btn" aria-label="Toggle Fullscreen">⛶</button>
      </div>
    </header>

    <!-- 1 Column Grid -->
    <main class="kds-grid kds-grid-single">
      <div class="kds-col kds-col-all">
        <div class="kds-col-header" style="border-top-color: var(--accent);">
          <h2>🔥 ALL ORDERS <span class="kds-count" id="count-all">0</span></h2>
        </div>
        <div class="kds-col-body" id="col-all"></div>
      </div>
    </main>

  </div>

  <script type="module" src="/src/kitchen.js"></script>
</body>
</html>

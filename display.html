
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Display | Bigi Awasaana</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Full Screen Display Resets */
    body {
      overflow: hidden;
      background: var(--bg);
    }
    
    .display-layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .brand-sidebar {
      width: 120px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 0;
    }

    .vertical-brand {
      font-family: 'Lalezar';
      font-size: 64px;
      color: var(--accent);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 4px;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px 60px;
      position: relative;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 60px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }

    .clock {
      font-family: 'Barlow Condensed';
      font-size: 32px;
      font-weight: 700;
      color: var(--gray);
      letter-spacing: 2px;
    }

    /* Specials Mode */
    .special-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .special-label {
      font-family: 'Barlow Condensed';
      font-size: 24px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      font-weight: 700;
    }

    .special-name {
      font-family: 'Lalezar';
      font-size: 140px;
      line-height: 0.9;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .special-desc {
      font-size: 32px;
      color: var(--gray);
      max-width: 800px;
      line-height: 1.4;
      margin-bottom: 60px;
    }

    .special-price {
      font-family: 'Barlow Condensed';
      font-size: 80px;
      font-weight: 900;
      color: var(--white);
    }

    /* Menu Mode */
    .menu-columns {
      column-count: 2;
      column-gap: 80px;
      height: 100%;
      padding-right: 20px;
    }

    .cat-label {
      font-family: 'Barlow Condensed';
      font-size: 32px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin: 40px 0 24px;
      font-weight: 700;
      break-after: avoid;
    }

    .cat-label:first-child { margin-top: 0; }

    .display-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 24px;
      break-inside: avoid;
      position: relative;
    }

    .display-item::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      border-bottom: 2px dotted var(--border);
      z-index: -1;
    }

    .display-name {
      font-size: 28px;
      font-weight: 500;
      background: var(--bg);
      padding-right: 16px;
    }

    .display-price {
      font-family: 'Barlow Condensed';
      font-size: 32px;
      font-weight: 700;
      background: var(--bg);
      padding-left: 16px;
    }

    /* Auto-scrolling wrapper */
    .scroll-wrapper {
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    
    .scroll-content {
      transition: transform 0.1s linear;
    }

    .qr-box {
      position: absolute;
      bottom: 40px;
      right: 60px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .qr-text {
      font-family: 'Barlow Condensed';
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.2;
    }
  </style>
</head>
<body>

  <div class="display-layout">
    <div class="brand-sidebar" style="width: 280px; padding: 60px 32px; background: var(--bg);">
      <img src="/logo.png" alt="Bigi Awasaana Logo" style="width: 100%; height: auto; object-fit: contain; margin-top: 20px;">
    </div>

    <div class="main-area">
      <div class="header-row">
        <div>
          <div style="font-family: 'Barlow Condensed'; font-size: 16px; letter-spacing: 4px; color: var(--gray); text-transform: uppercase; margin-bottom: 8px;">100% Zabiha Halal</div>
          <div style="font-family: 'Barlow Condensed'; font-size: 48px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;">Authentic Afghan Street Food</div>
        </div>
        <div id="clock" class="clock">00:00</div>
      </div>

      <!-- SPECIALS VIEW -->
      <div id="specials-container" class="special-card" style="display: none;">
        <div class="special-label">Chef's Special</div>
        <div id="special-name" class="special-name">Loading...</div>
        <div id="special-desc" class="special-desc"></div>
        <div id="special-price" class="special-price"></div>
      </div>

      <!-- FULL MENU VIEW -->
      <div id="menu-container" class="scroll-wrapper" style="display: none;">
        <div id="menu-scroll" class="scroll-content menu-columns">
          <!-- Items injected via JS -->
        </div>
      </div>

      <!-- QR Code Call to Action -->
      <div class="qr-box">
        <div class="qr-text">Skip the line.<br><span style="color: var(--accent);">Order online.</span></div>
        <!-- Replace with real QR code linking to your URL -->
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://bigiawasaana.com&bgcolor=0e0e0e&color=f0ece6" alt="QR Code" width="100" height="100" style="border-radius: 2px;">
      </div>
    </div>
  </div>

  <script type="module" src="/display.js"></script>
</body>
</html>

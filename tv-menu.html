<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Board — Bigi Awasaana</title>
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://bigi-awasaana-7b3ce.firebaseapp.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lalezar&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/tv-menu.css">
  <meta name="thumbnail" content="https://bigiawasaana.com/halal-tikka-kabob-los-angeles.webp">
</head>
<body>

  <!-- ══════════ CENTERED LOGO HEADER ══════════ -->
  <header class="tv-header">
    <img src="/logo.png" alt="Bigi Awasaana" class="tv-logo">
    <button id="tv-fullscreen-btn" class="tv-fullscreen-btn" title="Toggle Fullscreen">⛶</button>
  </header>

  <!-- ══════════ PROMO STRIP (from Firebase TV settings) ══════════ -->
  <div class="tv-promo-strip" id="tv-promo-strip" style="display: none;">
    <div class="tv-promo-inner" id="tv-promo-inner"></div>
  </div>

  <!-- ══════════ MAIN MENU GRID ══════════ -->
  <main class="tv-main" id="tv-main">
    <div class="tv-grid" id="tv-grid"></div>

    <!-- Loading -->
    <div class="tv-loading" id="tv-loading">
      <div class="tv-loading-spinner"></div>
      <p>Loading Menu…</p>
    </div>
  </main>

  <!-- ══════════ SPECIALS BANNER (cycles through featured) ══════════ -->
  <div class="tv-specials-bar" id="tv-specials-bar" style="display: none;">
    <span class="tv-specials-label">TODAY'S SPECIAL</span>
    <span class="tv-specials-text" id="tv-specials-text"></span>
  </div>

  <!-- ══════════ ANTI-SLEEP VIDEO LOOP ══════════ -->
  <video id="tv-nosleep" playsinline muted loop style="opacity:0; position:absolute; width:1px; height:1px; pointer-events:none;" src="data:video/webm;base64,GkXfo0AgQoaBAUL3gQFC8oEEQvOBCEKCQAR3ZWJtQoeBAkKFgQIYU4BnQAABZQUAAAAAAAAEAAABXgAAAs4T1kOIQnKGE8YBA4rIgEAAXwAAAwAAAwAAAAAYQoeBAkKFgQIYU4BnQAABZQUAAAAAAAAEAAABXgAAAs4="></video>

  <!-- ══════════ START OVERLAY ══════════ -->
  <div id="tv-start-overlay" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#060606; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
    <h1 style="color:#ff4500; font-family:'Barlow Condensed', sans-serif; font-size:4vw; text-transform:uppercase; margin-bottom:1vh;">Tap Here To Start Display</h1>
    <p style="color:#fff; font-family:'Outfit', sans-serif; font-size:1.5vw; opacity:0.8;">This activates fullscreen & prevents the TV from sleeping.</p>
  </div>

  <script type="module" src="/src/tv-menu.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Order Display - Bigi Awasaana</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lalezar&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/src/customer-display.css">
</head>
<body>

  <!-- Header -->
  <header class="cd-header">
    <div class="cd-header-left">
      <h1 class="cd-logo">🔥 BIGI <span>AWASAANA</span></h1>
    </div>
    <div class="cd-header-right">
      <p class="cd-tagline">Born from the Silk Road</p>
      <button id="cd-init-audio" class="cd-audio-btn">🔊 Enable Audio</button>
    </div>
  </header>

  <!-- 2 Columns -->
  <main class="cd-grid">
    <!-- Preparing Column -->
    <div class="cd-col">
      <div class="cd-col-header" style="border-top: 6px solid #f5a623;">
        <h2>🟡 PREPARING</h2>
      </div>
      <div class="cd-col-body" id="col-preparing">
        <!-- Order cards go here -->
      </div>
    </div>

    <!-- Ready for Pickup Column -->
    <div class="cd-col">
      <div class="cd-col-header" style="border-top: 6px solid #27ae60;">
        <h2>🟢 READY FOR PICKUP</h2>
      </div>
      <div class="cd-col-body" id="col-ready">
        <!-- Order cards go here -->
      </div>
    </div>
  </main>

  <script type="module" src="/src/customer-display.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV2 Menu — Bigi Awasaana</title>
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; overflow: hidden;
      font-family: sans-serif;
    }
    #menu-img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }
    #start-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #060606; z-index: 9999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer; color: white;
    }
    h1 { color: #ff4500; font-family: 'Arial Narrow', sans-serif; text-transform: uppercase; font-size: 4vw; }
    p { font-size: 1.5vw; opacity: 0.8; }
    /* Hide youtube video but keep it active */
    #yt-container {
      position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; overflow: hidden;
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1>Tap Here To Start Display (TV2)</h1>
    <p>This activates fullscreen & starts the background music to prevent sleep.</p>
  </div>

  <img id="menu-img" src="/tv2-menu.jpg" alt="TV2 Menu">

  <div id="yt-container"></div>

  <script>
    document.getElementById('start-overlay').addEventListener('click', () => {
      document.getElementById('start-overlay').style.display = 'none';
      
      // Request fullscreen
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
      }

      // Add Youtube video (Lofi Girl 10 hours)
      // using playlist parameter same as video id to allow looping
      const ytId = '5qap5aO4i9A'; 
      document.getElementById('yt-container').innerHTML = `
        <iframe width="100" height="100" 
          src="https://www.youtube.com/embed/${ytId}?autoplay=1&loop=1&playlist=${ytId}&controls=0" 
          frameborder="0" allow="autoplay" allowfullscreen>
        </iframe>
      `;
    });
  </script>
</body>
</html>

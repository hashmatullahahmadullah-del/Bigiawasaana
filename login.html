
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Bigi OS</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-pattern" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
  
  <div class="glass" style="width: 100%; max-width: 400px; padding: 40px; border-radius: 12px; text-align: center;">
    <div class="brand font-lalezar" style="font-size: 40px; color: var(--accent); margin-bottom: 30px;">BIGI <span style="color: white;">OS</span></div>
    
    <form id="login-form" style="display: flex; flex-direction: column; gap: 20px;">
      <input type="email" id="email" placeholder="Admin Email" required class="admin-input" style="width: 100%;">
      <input type="password" id="password" placeholder="Password" required class="admin-input" style="width: 100%;">
      <button type="submit" id="login-btn" class="ember-btn" style="width: 100%; height: 50px;">ENTER SYSTEM</button>
    </form>
    
    <p id="error-msg" style="color: #ff4444; font-size: 12px; margin-top: 20px; display: none;"></p>
  </div>

  <style>
    .admin-input { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); padding: 12px; color: var(--white); border-radius: 6px; font-family: inherit; }
  </style>

  <script type="module">
    import { auth } from './src/firebase.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "firebase/auth";

    // FIX #12: Redirect if already authenticated
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = '/admin.html';
      }
    });

    const loginForm = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('login-btn');

    loginForm.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;

      loginBtn.textContent = 'AUTHENTICATING...';
      loginBtn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = '/admin.html';
      } catch (err) {
        loginBtn.textContent = 'ENTER SYSTEM';
        loginBtn.disabled = false;
        errorMsg.textContent = "Invalid credentials. Access denied.";
        errorMsg.style.display = 'block';
      }
    };
  </script>
</body>
</html>
